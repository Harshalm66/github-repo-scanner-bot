name: Scan Repository

on:
  repository_dispatch:
    types: [process-url]
 
  workflow_dispatch:
    inputs:
      repo_url:
        description: 'GitHub Repository URL or owner/repo (https://github.com/owner/repo  or  owner/repo)'
        required: true
        default: 'https://github.com/lodash/lodash'
        type: string

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30
   
    steps:
      - name: 📋 Parse Repository URL
        id: parse
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            INPUT_URL="${{ github.event.inputs.repo_url }}"
          else
            INPUT_URL="${{ github.event.client_payload.repo_url }}"
          fi

          echo "Input URL: $INPUT_URL"

          CLEAN=$(echo "$INPUT_URL" \
            | sed -E 's#^https?://(www\.)?github\.com/##' \
            | sed -E 's#\.git$##' \
            | sed -E 's#/+$##')

          OWNER=$(echo "$CLEAN" | cut -d'/' -f1)
          REPO_NAME=$(echo "$CLEAN" | cut -d'/' -f2 -s)

          if [[ -z "$REPO_NAME" ]]; then
            echo "❌ Invalid GitHub repository format"
            exit 1
          fi

          REPO="$OWNER/$REPO_NAME"

          echo "repo=$REPO" >> $GITHUB_OUTPUT
          echo "url=$INPUT_URL" >> $GITHUB_OUTPUT

      - name: 🔽 Clone Target Repository
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.parse.outputs.repo }}
          path: target-repo
          fetch-depth: 0

      - name: 📊 Repository Information
        run: |
          cd target-repo
          echo "📦 Total files: $(find . -type f | wc -l)"
          cd ..

      # ✅ Language detection kept
      - name: 🔍 Detect Languages
        id: detect-languages
        run: |
          cd target-repo
          LANGUAGES=""

          if find . -name "*.js" -o -name "*.ts" -o -name "*.jsx" -o -name "*.tsx" | grep -q .; then
            LANGUAGES="$LANGUAGES javascript"
          fi

          if find . -name "*.py" | grep -q .; then
            LANGUAGES="$LANGUAGES python"
          fi

          if find . -name "*.java" | grep -q .; then
            LANGUAGES="$LANGUAGES java"
          fi

          if find . -name "*.go" | grep -q .; then
            LANGUAGES="$LANGUAGES go"
          fi

          if find . -name "*.cs" | grep -q .; then
            LANGUAGES="$LANGUAGES csharp"
          fi

          if find . -name "*.rb" | grep -q .; then
            LANGUAGES="$LANGUAGES ruby"
          fi

          cd ..

          LANGUAGES=$(echo $LANGUAGES | xargs)

          if [ -z "$LANGUAGES" ]; then
            echo "languages=none" >> $GITHUB_OUTPUT
          else
            echo "languages=$LANGUAGES" >> $GITHUB_OUTPUT
          fi

      # 🛡️ Semgrep
      - name: 🛡️ Run Semgrep
        continue-on-error: true
        run: |
          pip install semgrep
          cd target-repo
          semgrep --config=auto --json --output=../semgrep-results.json . || true
          semgrep --config=auto --sarif --output=../semgrep.sarif . || true
          cd ..

      # 🐍 Bandit
      - name: 🐍 Run Bandit (Python Security)
        if: contains(steps.detect-languages.outputs.languages, 'python')
        continue-on-error: true
        run: |
          pip install bandit
          bandit -r target-repo -f json -o bandit-report.json || true

      # 📦 njsscan
      - name: 📦 Run njsscan (Node.js Security)
        if: contains(steps.detect-languages.outputs.languages, 'javascript')
        continue-on-error: true
        run: |
          pip install njsscan
          njsscan target-repo --json --output njsscan-report.json || true

      # 🔐 Trivy Vulnerabilities
      - name: 🔐 Run Trivy (Vulnerabilities)
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          scan-type: 'fs'
          scan-ref: 'target-repo'
          format: 'json'
          output: 'trivy-results.json'
          severity: 'CRITICAL,HIGH,MEDIUM,LOW'

      # 🔐 Trivy Secrets
      - name: 🔐 Run Trivy (Secrets)
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          scan-type: 'fs'
          scan-ref: 'target-repo'
          scanners: 'secret'
          format: 'json'
          output: 'trivy-secrets.json'

      # 🔒 Safety
      - name: 🔒 Run Safety (Python Dependencies)
        if: contains(steps.detect-languages.outputs.languages, 'python')
        continue-on-error: true
        run: |
          if [ -f target-repo/requirements.txt ]; then
            pip install safety
            safety check --file target-repo/requirements.txt --json > safety-results.json || true
          fi

      # 📦 npm audit
      - name: 📦 Run npm audit
        if: contains(steps.detect-languages.outputs.languages, 'javascript')
        continue-on-error: true
        run: |
          if [ -f target-repo/package.json ]; then
            cd target-repo
            npm install --package-lock-only || true
            npm audit --json > ../npm-audit.json || true
            cd ..
          fi

      - name: 📝 Generate Final Report
        if: always()
        run: |
          echo "# 🔒 Security & Quality Scan Report" > final-report.md
          echo "" >> final-report.md
          echo "**Repository:** ${{ steps.parse.outputs.repo }}" >> final-report.md
          echo "**Scanned:** $(date -u)" >> final-report.md
          echo "" >> final-report.md
          echo "CodeQL scanning has been removed from this workflow." >> final-report.md
          echo "" >> final-report.md
          echo "Detailed JSON reports are available in artifacts." >> final-report.md

      - name: 📤 Upload All Scan Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-scan-results-${{ github.run_number }}
          path: |
            final-report.md
            semgrep-results.json
            semgrep.sarif
            bandit-report.json
            njsscan-report.json
            trivy-results.json
            trivy-secrets.json
            safety-results.json
            npm-audit.json
          retention-days: 30

      - name: Output Run ID
        run: echo "Run ID: ${{ github.run_id }}"

      - name: Output Scan Summary
        if: always()
        run: |
          echo "## Scan Summary" >> $GITHUB_STEP_SUMMARY
          cat final-report.md >> $GITHUB_STEP_SUMMARY
