name: Scan Repository

on:
  repository_dispatch:
    types: [process-url]
  workflow_dispatch:
    inputs:
      repo_url:
        description: 'GitHub Repository URL or owner/repo'
        required: true
        default: 'https://github.com/lodash/lodash'
        type: string

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 📋 Parse Repository URL
        id: parse
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            INPUT_URL="${{ github.event.inputs.repo_url }}"
          else
            INPUT_URL="${{ github.event.client_payload.repo_url }}"
          fi

          CLEAN=$(echo "$INPUT_URL" | sed -E 's#^https?://(www\.)?github\.com/##' | sed -E 's#\.git$##' | sed -E 's#/+$##')
          OWNER=$(echo "$CLEAN" | cut -d'/' -f1)
          REPO_NAME=$(echo "$CLEAN" | cut -d'/' -f2 -s)
          REPO="${REPO_NAME:+${OWNER}/${REPO_NAME}}"
          REPO="${REPO:-$OWNER}"

          if [[ ! "$REPO" =~ ^[a-zA-Z0-9][a-zA-Z0-9.-]+(/[a-zA-Z0-9._-]+)?$ ]]; then
            echo "❌ Invalid repo format: $REPO"
            exit 1
          fi

          echo "repo=$REPO" >> $GITHUB_OUTPUT
          echo "url=$INPUT_URL" >> $GITHUB_OUTPUT

      - name: 🔽 Shallow Clone Target Repository
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.parse.outputs.repo }}
          path: target-repo
          fetch-depth: 1

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install security scanners
        run: |
          python -m pip install --upgrade pip
          pip install semgrep bandit njsscan safety

      - name: 🔍 Quick language detection
        id: detect-languages
        run: |
          cd target-repo
          LANGUAGES=""
          if find . -type f \( -name "*.js" -o -name "*.ts" -o -name "*.jsx" -o -name "*.tsx" \) -print -quit | grep -q .; then LANGUAGES="$LANGUAGES javascript"; fi
          if find . -type f -name "*.py" -print -quit | grep -q .; then LANGUAGES="$LANGUAGES python"; fi
          if find . -type f -name "*.java" -print -quit | grep -q .; then LANGUAGES="$LANGUAGES java"; fi
          if find . -type f -name "*.go"   -print -quit | grep -q .; then LANGUAGES="$LANGUAGES go"; fi
          if find . -type f \( -name "*.c" -o -name "*.cpp" -o -name "*.h" \) -print -quit | grep -q .; then LANGUAGES="$LANGUAGES cpp"; fi
          LANGUAGES=$(echo $LANGUAGES | xargs)
          echo "languages=${LANGUAGES:-none}" >> $GITHUB_OUTPUT
          cd ..

      - name: 🔐 Run Trivy (vuln + secret + misconfig)
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          scan-type: fs
          scan-ref: target-repo
          scanners: vuln,secret,misconfig
          format: json
          output: trivy-combined.json
          severity: CRITICAL,HIGH,MEDIUM,LOW

      - name: 🛡️ Run Semgrep
        continue-on-error: true
        timeout-minutes: 5
        run: |
          cd target-repo
          semgrep --config=auto --json --output=../semgrep-results.json . || true
          cd ..

      - name: 🐍 Run Bandit (Python only)
        if: contains(steps.detect-languages.outputs.languages, 'python')
        continue-on-error: true
        timeout-minutes: 3
        run: bandit -r target-repo -f json -o bandit-report.json || true

      - name: 📦 Run njsscan (JS/TS only)
        if: contains(steps.detect-languages.outputs.languages, 'javascript')
        continue-on-error: true
        timeout-minutes: 3
        run: njsscan target-repo --json --output njsscan-report.json || true

      - name: 🔒 Run Safety (if requirements.txt exists)
        if: contains(steps.detect-languages.outputs.languages, 'python') && hashFiles('target-repo/requirements.txt') != ''
        continue-on-error: true
        run: safety check --file target-repo/requirements.txt --json > safety-results.json || true

      - name: 📦 Run npm audit (if package.json exists)
        if: contains(steps.detect-languages.outputs.languages, 'javascript') && hashFiles('target-repo/package.json') != ''
        continue-on-error: true
        run: |
          cd target-repo
          npm install --package-lock-only --no-audit --no-fund --quiet || true
          npm audit --json > ../npm-audit.json || true
          cd ..
      # ────────────────────────────────────────────────
      # Pretty final report (after callback – no timeout impact)
      # ────────────────────────────────────────────────
      - name: 📝 Generate pretty final report
        if: always()
        run: |
          cat << 'EOFMARKER' > final-report.md
          # 🔒 Security & Quality Scan Report

          **Repository** — ${{ steps.parse.outputs.repo }}  
          **Scanned URL** — ${{ steps.parse.outputs.url }}  
          **Scan Date** — $(date -u +"%Y-%m-%d %H:%M:%S UTC")  
          **Workflow Run** — [#${{ github.run_number }}](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})  
          **Triggered by** — ${{ github.event_name }}

          ---

          ## 🎯 Executive Summary

          | Risk Level       | Total Issues | Critical | High | Medium | Low | Secrets |
          |------------------|--------------|----------|------|--------|-----|---------|
          | **Overall**      | ${{ env.TOTAL_ISSUES:-0 }} | ${{ env.CRITICAL:-0 }} | ${{ env.HIGH:-0 }} | ${{ env.MEDIUM:-0 }} | ${{ env.LOW:-0 }} | ${{ env.SECRETS:-0 }} |

          **Risk Assessment**:
          EOFMARKER

          if [ "${{ env.CRITICAL:-0 }}" -gt 0 ]; then
            echo "- 🔴 **CRITICAL RISK** — Immediate action required" >> final-report.md
          elif [ "${{ env.HIGH:-0 }}" -gt 10 ]; then
            echo "- 🟠 **HIGH RISK** — Address high-severity issues urgently" >> final-report.md
          elif [ "${{ env.MEDIUM:-0 }}" -gt 20 ] || [ "${{ env.SECRETS:-0 }}" -gt 0 ]; then
            echo "- 🟡 **MEDIUM RISK** — Review recommended" >> final-report.md
          else
            echo "- ✅ **LOW RISK** — Repository appears in good shape" >> final-report.md
          fi

          cat << 'EOFMARKER' >> final-report.md

          ---

          ## 🔐 Trivy Scan Results (Vulnerabilities + Secrets + Misconfigurations)

          EOFMARKER

          if [ -f trivy-combined.json ] && [ -s trivy-combined.json ]; then
            CRIT=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' trivy-combined.json 2>/dev/null || echo 0)
            HIGH=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="HIGH")] | length' trivy-combined.json 2>/dev/null || echo 0)
            MED=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="MEDIUM")] | length' trivy-combined.json 2>/dev/null || echo 0)
            LOW=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="LOW")] | length' trivy-combined.json 2>/dev/null || echo 0)
            SEC=$(jq '[.Results[]?.Secrets[]?] | length' trivy-combined.json 2>/dev/null || echo 0)

            cat << EOF >> final-report.md
          - Critical   : $CRIT  
          - High       : $HIGH  
          - Medium     : $MED  
          - Low        : $LOW  
          - Secrets    : $SEC  

          EOF

            if [ "$CRIT" -gt 0 ] || [ "$HIGH" -gt 0 ]; then
              echo "#### Top Critical / High Issues (first 5)" >> final-report.md
              jq -r '.Results[]?.Vulnerabilities[]? | select(.Severity=="CRITICAL" or .Severity=="HIGH") | "- **\(.VulnerabilityID)** – \(.Title // .PkgName) (\(.Severity)) in \(.PkgName)"' trivy-combined.json 2>/dev/null | head -5 >> final-report.md || echo "- (details parsing failed)" >> final-report.md
            else
              echo "- ✅ No critical or high severity issues found" >> final-report.md
            fi
          else
            echo "- ⚠️ Trivy scan did not produce results" >> final-report.md
          fi

          cat << 'EOFMARKER' >> final-report.md

          ---

          ## 🛡️ Other Scanner Results

          - **Semgrep**: $(jq '.results | length' semgrep-results.json 2>/dev/null || echo "0") findings
          - **Bandit** (Python): $(jq '[.results[] | select(.issue_severity=="HIGH")] | length' bandit-report.json 2>/dev/null || echo "0") high, $(jq '[.results[] | select(.issue_severity=="MEDIUM")] | length' bandit-report.json 2>/dev/null || echo "0") medium
          - **njsscan** (JS/TS): $(jq '.total_count.sec // 0' njsscan-report.json 2>/dev/null || echo "0") security issues
          - **npm audit**: $(jq '.metadata.vulnerabilities.total // 0' npm-audit.json 2>/dev/null || echo "0") vulnerabilities
          - **Safety** (Python deps): $(jq 'length' safety-results.json 2>/dev/null || echo "0") vulnerable packages

          ---

          ## 📌 Recommended Next Steps

          - 🔴 Critical issues → **fix immediately** and re-scan
          - 🟠 High issues → address within **7 days**
          - 🟡 Medium issues → plan fixes in next sprint
          - 🔑 Any secrets → **rotate credentials** urgently
          - Download full details from **Artifacts** in this run
          - Consider adding **Dependabot** or **CodeQL** alerts in repo settings

          **Scan completed successfully.**  
          Thank you for keeping your code secure! 🛡️

          EOFMARKER

      - name: 📤 Upload scan artifacts (including pretty report)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-scan-results-${{ github.run_number }}
          path: |
            final-report.md
            *.json
            *.sarif
          retention-days: 30

      - name: ✅ Final summary
        if: always()
        run: |
          echo "Scan completed for ${{ steps.parse.outputs.repo }}"
          echo "Run: ${{ github.run_id }}"
          echo "Artifact: security-scan-results-${{ github.run_number }}"
