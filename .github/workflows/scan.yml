name: Scan Repository

on:
  repository_dispatch:
    types: [process-url]
  workflow_dispatch:
    inputs:
      repo_url:
        description: 'GitHub Repository URL or owner/repo'
        required: true
        default: 'https://github.com/lodash/lodash'
        type: string

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 📋 Parse Repository URL
        id: parse
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            INPUT_URL="${{ github.event.inputs.repo_url }}"
          else
            INPUT_URL="${{ github.event.client_payload.repo_url }}"
          fi

          CLEAN=$(echo "$INPUT_URL" | sed -E 's#^https?://(www\.)?github\.com/##' | sed -E 's#\.git$##' | sed -E 's#/+$##')
          OWNER=$(echo "$CLEAN" | cut -d'/' -f1)
          REPO_NAME=$(echo "$CLEAN" | cut -d'/' -f2 -s)
          REPO="${REPO_NAME:+${OWNER}/${REPO_NAME}}"
          REPO="${REPO:-$OWNER}"

          if [[ ! "$REPO" =~ ^[a-zA-Z0-9][a-zA-Z0-9.-]+(/[a-zA-Z0-9._-]+)?$ ]]; then
            echo "❌ Invalid repo format: $REPO"
            exit 1
          fi

          echo "repo=$REPO" >> $GITHUB_OUTPUT
          echo "url=$INPUT_URL" >> $GITHUB_OUTPUT
          echo "owner=$OWNER" >> $GITHUB_OUTPUT
          echo "repo_name=$REPO_NAME" >> $GITHUB_OUTPUT

      - name: 🔽 Shallow Clone Target Repository
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.parse.outputs.repo }}
          path: target-repo
          fetch-depth: 1

      - name: 🐍 Setup Python + Install scanners (cached)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install security scanners once
        run: |
          python -m pip install --upgrade pip
          pip install semgrep bandit njsscan safety

      - name: 🔍 Quick language detection
        id: detect-languages
        run: |
          cd target-repo
          LANGUAGES=""
          if find . -type f \( -name "*.js" -o -name "*.ts" -o -name "*.jsx" -o -name "*.tsx" \) -print -quit | grep -q .; then LANGUAGES="$LANGUAGES javascript"; fi
          if find . -type f -name "*.py" -print -quit | grep -q .; then LANGUAGES="$LANGUAGES python"; fi
          if find . -type f -name "*.java" -print -quit | grep -q .; then LANGUAGES="$LANGUAGES java"; fi
          if find . -type f -name "*.go"   -print -quit | grep -q .; then LANGUAGES="$LANGUAGES go"; fi
          if find . -type f \( -name "*.c" -o -name "*.cpp" -o -name "*.h" -o -name "*.hpp" \) -print -quit | grep -q .; then LANGUAGES="$LANGUAGES cpp"; fi
          LANGUAGES=$(echo $LANGUAGES | xargs)
          echo "languages=${LANGUAGES:-none}" >> $GITHUB_OUTPUT
          cd ..

      - name: 🔐 Run Trivy (vuln + secret + misconfig) - single pass
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          scan-type: fs
          scan-ref: target-repo
          scanners: vuln,secret,misconfig
          format: json
          output: trivy-combined.json
          severity: CRITICAL,HIGH,MEDIUM,LOW

      - name: 🛡️ Run Semgrep
        continue-on-error: true
        run: |
          cd target-repo
          semgrep --config=auto --json --output=../semgrep-results.json . || true
          cd ..

      - name: 🐍 Run Bandit (Python only)
        if: contains(steps.detect-languages.outputs.languages, 'python')
        continue-on-error: true
        run: bandit -r target-repo -f json -o bandit-report.json || true

      - name: 📦 Run njsscan (JS/TS only)
        if: contains(steps.detect-languages.outputs.languages, 'javascript')
        continue-on-error: true
        run: njsscan target-repo --json --output njsscan-report.json || true

      - name: 🔒 Run Safety (if requirements.txt exists)
        if: contains(steps.detect-languages.outputs.languages, 'python')
        continue-on-error: true
        run: |
          if [ -f target-repo/requirements.txt ]; then
            safety check --file target-repo/requirements.txt --json > safety-results.json || true
          fi

      - name: 📦 Run npm audit (if package.json exists)
        if: contains(steps.detect-languages.outputs.languages, 'javascript')
        continue-on-error: true
        run: |
          if [ -f target-repo/package.json ]; then
            cd target-repo
            npm install --package-lock-only --no-audit --no-fund --quiet || true
            npm audit --json > ../npm-audit.json || true
            cd ..
          fi

      # ────────────────────────────────────────────────
      # Send FAST callback to agent BEFORE heavy reporting
      # ────────────────────────────────────────────────
      - name: 📤 Send minimal result to agent (critical for timeout avoidance)
        if: |
          always() &&
          github.event_name == 'repository_dispatch' &&
          github.event.client_payload.callback_url != ''
        run: |
          CRITICAL=0 HIGH=0 MEDIUM=0 LOW=0 SECRETS=0 TOTAL=0

          # Quick Trivy counts
          if [ -f trivy-combined.json ]; then
            CRITICAL=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' trivy-combined.json 2>/dev/null || echo 0)
            HIGH=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="HIGH")] | length' trivy-combined.json 2>/dev/null || echo 0)
            MEDIUM=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="MEDIUM")] | length' trivy-combined.json 2>/dev/null || echo 0)
            LOW=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="LOW")] | length' trivy-combined.json 2>/dev/null || echo 0)
            SECRETS=$(jq '[.Results[]?.Secrets[]?] | length' trivy-combined.json 2>/dev/null || echo 0)
          fi

          TOTAL=$((CRITICAL + HIGH + MEDIUM + LOW + SECRETS))

          cat > result.json << JSON
          {
            "request_id": "${{ github.event.client_payload.request_id }}",
            "status": "${{ job.status }}",
            "run_url": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}",
            "artifact": "security-scan-results-${{ github.run_number }}",
            "critical": "$CRITICAL",
            "high": "$HIGH",
            "medium": "$MEDIUM",
            "low": "$LOW",
            "secrets": "$SECRETS",
            "total_issues": "$TOTAL"
          }
          JSON

          curl -X POST "${{ github.event.client_payload.callback_url }}" \
            -H "Content-Type: application/json" \
            -d @result.json || echo "Callback failed (non-blocking)"

      # ────────────────────────────────────────────────
      # Heavy report generation AFTER callback
      # ────────────────────────────────────────────────
      - name: 📝 Generate full report (non-blocking for agent)
        if: always()
        run: |
          # ... your original huge report generation script here ...
          # (keep it exactly as you had, or slim it down if needed)
          # For brevity I'm not repeating the 300+ line report script here.
          # Just move your existing "Generate Final Report" content into this step.
          # Make sure artifact upload comes after this.

      - name: 📤 Upload scan artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-scan-results-${{ github.run_number }}
          path: |
            *.json
            *.sarif
            final-report.md
          retention-days: 30

      - name: ✅ Workflow Summary
        if: always()
        run: |
          echo "Scan completed for ${{ steps.parse.outputs.repo }}"
          echo "Run: ${{ github.run_id }}"
          echo "Artifact: security-scan-results-${{ github.run_number }}"
